<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>유의어 배틀 게임</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;800;900&display=swap');
    
    /* 멀티터치 최적화 및 제스처 방지 (화면 튕김, 드래그, 줌 완전 차단) */
    body { 
      font-family: 'Noto Sans KR', sans-serif; 
      touch-action: none; /* 멀티터치 필수 속성 */
      -webkit-tap-highlight-color: transparent; 
      user-select: none; 
      -webkit-user-select: none; 
      -webkit-touch-callout: none;
      overflow: hidden;
    }
    
    .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .modal-in { animation: fadeIn 0.3s ease-out forwards; }
    
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8) translateY(10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; backdrop-filter: blur(0px); }
      100% { opacity: 1; backdrop-filter: blur(8px); }
    }

    .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake {
      10%, 90% { transform: translate3d(-2px, 0, 0); }
      20%, 80% { transform: translate3d(4px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
      40%, 60% { transform: translate3d(6px, 0, 0); }
    }

    /* 버튼 터치 시 물리적 스케일 축소 효과 */
    .btn-pressed { transform: scale(0.95) !important; filter: brightness(0.9); transition: all 0.1s; }
  </style>
</head>
<body class="h-[100dvh] w-screen flex flex-col bg-slate-900 text-slate-100">

  <div id="setup-screen" class="flex-1 w-full flex flex-col items-center justify-center p-4 min-h-0 bg-gradient-to-br from-indigo-50 to-blue-100 text-slate-800 absolute inset-0 z-20">
    <h1 class="text-4xl md:text-6xl lg:text-7xl font-black text-blue-600 tracking-tight drop-shadow-md mb-6 lg:mb-8 text-center break-keep">
      ✨ 유의어 배틀 게임
    </h1>

    <div class="bg-white rounded-[2rem] lg:rounded-[3rem] shadow-2xl p-6 lg:p-10 w-full max-w-4xl flex flex-col gap-6 lg:gap-8 border-4 lg:border-8 border-blue-400 max-h-[85dvh] overflow-y-auto">
      
      <div>
        <h2 class="text-xl lg:text-2xl font-bold text-slate-600 mb-3 text-center">👥 몇 명이서 대결할까요?</h2>
        <div class="flex gap-2 lg:gap-4 justify-center">
          <button onclick="setPlayerCount(2)" id="btn-p2" class="flex-1 py-3 lg:py-4 text-xl lg:text-2xl font-bold rounded-xl lg:rounded-2xl border-4 border-slate-200 hover:bg-slate-50 transition-colors">2인 배틀</button>
          <button onclick="setPlayerCount(3)" id="btn-p3" class="flex-1 py-3 lg:py-4 text-xl lg:text-2xl font-bold rounded-xl lg:rounded-2xl border-4 border-slate-200 hover:bg-slate-50 transition-colors">3인 배틀</button>
          <button onclick="setPlayerCount(4)" id="btn-p4" class="flex-1 py-3 lg:py-4 text-xl lg:text-2xl font-bold rounded-xl lg:rounded-2xl border-4 border-blue-500 bg-blue-50 text-blue-700 transition-colors">4인 배틀</button>
        </div>
      </div>

      <div>
        <h2 class="text-xl lg:text-2xl font-bold text-slate-600 mb-3 text-center">🎮 어떤 방식으로 대결할까요?</h2>
        <div class="flex flex-col gap-3 lg:gap-4">
          <button onclick="setGameMode('A')" id="btn-modeA" class="w-full py-3 lg:py-4 px-4 lg:px-6 rounded-xl lg:rounded-2xl border-4 border-slate-200 flex flex-col items-center hover:bg-slate-50 transition-colors text-slate-600">
            <span class="text-xl lg:text-2xl font-bold mb-1 text-slate-800">🅰️ 개별 랜덤 출제 (기본)</span>
            <span class="text-xs lg:text-sm font-medium">플레이어마다 문제가 다르게 나옵니다. (커닝 방지)</span>
          </button>
          <button onclick="setGameMode('B')" id="btn-modeB" class="w-full py-3 lg:py-4 px-4 lg:px-6 rounded-xl lg:rounded-2xl border-4 border-blue-500 bg-blue-50 flex flex-col items-center text-blue-700 transition-colors">
            <span class="text-xl lg:text-2xl font-bold mb-1 text-blue-800">🅱️ 동일 출제 스피드전</span>
            <span class="text-xs lg:text-sm font-medium">모두 똑같은 문제를 풉니다! 누가 먼저 푸나 경쟁하세요.</span>
          </button>
        </div>
      </div>

      <button onclick="startGame()" class="w-full rounded-full py-4 lg:py-6 text-3xl lg:text-4xl font-black bg-blue-500 text-white shadow-lg lg:shadow-[0_10px_25px_rgba(59,130,246,0.5)] transition-transform active:scale-95 hover:bg-blue-600 tracking-wide mt-2">
        🚀 배틀 시작!
      </button>
    </div>

    <div class="mt-4 lg:mt-6 flex flex-wrap items-center justify-center gap-3 bg-white/80 px-6 py-3 rounded-full shadow-md backdrop-blur-sm">
      <span class="font-bold text-slate-600 text-sm lg:text-base">📂 선생님 단어장</span>
      <button onclick="downloadTemplate()" class="rounded-lg border-2 border-slate-400 px-3 py-1.5 text-xs lg:text-sm font-bold hover:bg-slate-200 transition-colors">📥 양식 다운로드</button>
      <input type="file" id="file-input" accept=".csv" class="w-48 text-xs lg:text-sm font-bold text-slate-600 file:mr-2 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer" onchange="handleFileUpload(event)" />
      <span id="upload-msg" class="text-xs lg:text-sm font-bold hidden px-2"></span>
    </div>
  </div>

  <div id="game-screen" class="hidden flex-col h-full w-full min-h-0 relative bg-slate-900 z-10">
    
    <div class="w-full flex justify-between items-center px-4 py-2 lg:px-6 lg:py-3 bg-slate-800 shadow-md z-10 flex-shrink-0">
      <h1 class="text-xl lg:text-2xl font-black text-slate-300">⚔️ 배틀 모드</h1>
      <div class="flex items-center gap-3 lg:gap-4">
        <span class="text-sm lg:text-lg font-bold text-slate-400">남은 시간</span>
        <span id="global-time" class="text-4xl lg:text-5xl font-black text-rose-500 drop-shadow-[0_0_10px_rgba(244,63,94,0.5)] w-16 text-center">60</span>
      </div>
      <button onclick="goToHome()" class="px-3 py-1.5 lg:px-4 lg:py-2 rounded-lg lg:rounded-xl bg-slate-700 text-slate-300 text-sm lg:text-base font-bold hover:bg-slate-600">나가기</button>
    </div>

    <div class="w-full h-1 lg:h-2 bg-slate-700 flex-shrink-0">
      <div id="global-progress" class="h-full bg-rose-500 transition-all duration-1000 ease-linear" style="width: 100%"></div>
    </div>

    <div id="players-container" class="flex-1 flex flex-row w-full h-full min-h-0">
      </div>
  </div>

  <div id="result-screen" class="hidden absolute inset-0 z-30 flex items-center justify-center bg-slate-900/90 backdrop-blur-md p-4 modal-in">
    <div class="bg-white rounded-[2rem] lg:rounded-[3rem] shadow-2xl w-full max-w-3xl lg:max-w-4xl overflow-hidden text-center border-4 lg:border-8 border-amber-400 flex flex-col max-h-[90dvh]">
      <div class="bg-gradient-to-r from-amber-400 to-orange-500 text-white py-6 lg:py-8 flex-shrink-0">
        <h2 class="text-3xl lg:text-5xl font-black tracking-tight drop-shadow-md">🏆 배틀 종료! 최종 순위</h2>
      </div>
      
      <div class="p-4 lg:p-8 space-y-3 lg:space-y-4 bg-slate-50 overflow-y-auto flex-1" id="ranking-container">
        </div>

      <div class="p-4 lg:p-8 flex gap-3 lg:gap-4 bg-white flex-shrink-0">
        <button onclick="goToHome()" class="flex-1 rounded-full py-4 lg:py-6 text-xl lg:text-3xl font-black bg-slate-200 text-slate-700 shadow-lg hover:bg-slate-300 transition-transform active:scale-95">
          🏠 처음으로
        </button>
        <button onclick="startGame()" class="flex-1 rounded-full py-4 lg:py-6 text-xl lg:text-3xl font-black bg-amber-400 text-amber-900 shadow-lg hover:bg-amber-300 transition-transform active:scale-95">
          🔄 다시 한판!
        </button>
      </div>
    </div>
  </div>
